<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
</head>
<nav class="navbar fixed-top navbar-dark bg-dark">
  <a class="navbar-brand" href="#">STANZASHIP</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

<form id="search-form" method="get" action="{% url 'main:search_results' %}">
  <input type="hidden" name="type" id="search-type" value="general">
  <div class="input-group">
    <input type="text" name="q" id="search-input" class="form-control" placeholder="Search" aria-label="Search" aria-describedby="button-addon2">
    <div class="input-group-append">
      <button class="btn btn-outline-secondary" type="submit" id="button-addon2">🔍︎</button>
    </div>
    <div class="input-group-append">
      <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Search options</button>
      <div class="dropdown-menu">
        <a class="dropdown-item search-option" data-type="general" href="#">General Search</a>
        <div role="separator" class="dropdown-divider"></div>
        <a class="dropdown-item search-option" data-type="author" href="#">Author</a>
        <a class="dropdown-item search-option" data-type="title" href="#">Title</a>
      </div>
    </div>
  </div>
</form>


</div>
  <div class="collapse navbar-collapse" id="navbarSupportedContent">
    <ul class="navbar-nav mr-auto">
      <li class="nav-item active">
        <a class="nav-link" href="{% url 'main:index' %}">STANZA <span class="sr-only">(current)</span></a>
      </li>
        <li class="nav-item active">
        <a class="nav-link" href="{% url 'main:write' %}">WRITE <span class="sr-only">(current)</span></a>
          </li>
        <li class="nav-item active">
        <a class="nav-link" href="{% url 'main:profile' %}">PROFILE <span class="sr-only">(current)</span></a>
      </li>
      <li class="nav-item active">
        <a class="nav-link" href="{% url 'main:login' %}">LOG IN <span class="sr-only">(current)</span></a>
      </li>
      </li>
    </ul>
  </div>
</nav>
</html>
<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>


<script>
  document.querySelectorAll('.search-option').forEach(function(link) {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('search-type').value = this.dataset.type;
      document.getElementById('search-form').submit();
    });
  });
</script>
