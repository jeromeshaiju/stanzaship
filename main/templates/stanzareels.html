<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
 
<style>
  
  body {
    background-color: #fce4ec; /* Baby Pink */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: sans-serif;
  }
  .container {
    background-color: #ffccbc; /* Orangish Box */
    width: 300px;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    word-wrap: break-word; /* Text Wrap */
    text-align: center;
  }
  h2 { margin-top: 0; color: #d84315; }
  p { font-style: italic; line-height: 1.5; }
  .author { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9em; }

  .controls {
    display: flex;
    justify-content: space-between;
    position: absolute;
    bottom: 20px;
    left: 20px;
    right: 20px;
  }
  button {
    border: none;
    padding: 10px 15px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2em;
    transition: transform 0.2s;
  }
  button:hover { transform: scale(1.1); }
  .cross-btn { background-color: #ef5350; color: white; }
  .like-btn { background-color: #66bb6a; color: white; }
</style>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
</head>
<body>
  {% include "header.html" %}
  {% include "stanza.html" %}
  <form action="{% url 'main:index' %}" method="get">
    <div class="controls">
      <button class="cross-btn" type="submit" name="action" value="skip">✖</button>
      <button class="like-btn" type="submit" name="action" value="like+{{ stanza.id }}">❤</button>
    </div>
  </form>

</body>
</html>
