<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

<link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@yaireo/tagify/dist/tagify.css">

<style>
  
  body {
    background-color: #fce4ec; /* Baby Pink */
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding-top: 100px; 
  }
 .container {
    background-color: #ffffff; 
    width: 100%;
    padding: 10%;
    border-radius: 8px;
    font-family: "Times New Roman", serif;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

</style>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
</head>
<body>
  {% include "header.html" %}


  
<div class="container">
<h3>Title</h3>
{% if user.is_authenticated %}
  <div class="input-group mb-3">
  <input type="text" class="form-control" id="poem-title" placeholder="Add a Title" aria-label="Example text with button addon" aria-describedby="button-addon1">
  </div>
<h3>Compose a verse</h3>
<div id="editor">
  <p>write a stanza!</p>
  <p>make a <strong>bold</strong> move and write.</p>
  <p><br /></p>
</div>
<p><strong>Character Count:</strong> <span id="charCount">0</span>/450</p>
<h3>Tags</h3>
<input name="tags" id="tag-input" class="form-control">
<h3>Author</h3>
<p>{{ user.username }}</p>
<button class="btn btn-primary mt-3" id="getTextBtn" action="submit_poem">UPLOAD</button>
</div>
{% else %}
<div class="alert alert-info" role="alert">
  Please <a href="{% url 'main:login' %}" class="alert-link">log in</a> to write a poem!
</div>
{% endif %}





<script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
<script>
  const quill = new Quill('#editor', {
    theme: 'snow'
  });


  // if char count greater thjan 450, prevent further input
  quill.on('text-change', function(delta, oldDelta, source) {
    const text = quill.getText();
    const charCount = text.length - 1; 
    if (charCount > 450) {
      quill.deleteText(450, charCount);
    }
    else{
    document.getElementById('charCount').textContent = charCount;
    }
  });
  // Get text when button is clicked and send a POST request to the server if both title and content are not empty
  document.getElementById('getTextBtn').addEventListener('click', function() {
    const plainText = quill.getText();
    const title = document.getElementById('poem-title').value.trim();
    const tagValues = tagify.value.map(tag => tag.value);
    if (title && plainText.trim()) {
      fetch("{% url 'main:submit_poem' %}", {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify({ title: title, content: plainText, tags: tagValues })
      })
      .then(response => response.json())
      .then(data => {
          if (data.status === 'success') {
              window.location.href = data.redirect;
          } else {
              alert(data.message);
          }
      })
      .catch(error => {
        console.error('Error submitting poem:', error);
        alert('Failed to submit poem. Please try again.');
      });
    } else {
      alert('Please enter both a title and some content for your poem.');
    }

    
  });

  // Initialize character count on page load
  const initialText = quill.getText();
  document.getElementById('charCount').textContent = initialText.length - 1;
</script>
<script src="https://cdn.jsdelivr.net/npm/@yaireo/tagify"></script>
<script>
  var input = document.getElementById('tag-input');
  var tagify = new Tagify(input, {
    whitelist: {{ tags|safe }},
    dropdown: {
      enabled: 1,       
      fuzzySearch: true 
    }
  });
</script>
</html>
